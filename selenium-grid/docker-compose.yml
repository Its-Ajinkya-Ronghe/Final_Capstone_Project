version: '3'
services:
  hub:
    image: selenium/hub:4.1.0
    ports:
      - "4442:4442"
      - "4443:4443"
      - "4444:4444"
  node-chrome:
    image: selenium/node-chrome:4.1.0
    depends_on:
      - hub
    environment:
      - SE_EVENT_BUS_HOST=hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    volumes:
      - /dev/shm:/dev/shm
